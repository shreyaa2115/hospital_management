<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Success</title>
    <style>
        body {
            background-image: url('https://th.bing.com/th/id/OIP.Ua1NX2aa5K5lSKihs_YJSQHaEK?rs=1&pid=ImgDetMain'); /* Replace with the actual image path */
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
        }
        h2 {
            color: yellow;
        }
        table {
            margin: 20px auto;
            border-collapse: collapse;
            width: 50%;
            background: rgba(0, 0, 0, 0.8); /* Semi-transparent black background for the table */
            color: white;
            border-radius: 8px;
            overflow: hidden;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: left;
        }
        th {
            background-color: #4CAF50;
            color: white;
        }
        td {
            background-color: rgba(255, 255, 255, 0.1);
        }
        p {
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <h1>Welcome, {{ user_type }}</h1>
    {% if message %}
        <p style="color: green; font-weight: bold; font-size: 20px;">{{ message }}</p>
    {% endif %}
    <table>
        <thead>
            <tr>
                <th>Field</th>
                <th>Value</th>
            </tr>
        </thead>
        <tbody>
            {% for key, value in details.items() %}
                <tr>
                    <td>{{ key }}</td>
                    <td>{{ value }}</td>
                </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
