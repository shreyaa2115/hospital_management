<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospital Management</title>
    <style>
        body {
            background-image: url('https://th.bing.com/th/id/OIP.MZhYhFMUG9-O9NDsPs1tBwHaER?w=232&h=180&c=7&r=0&o=5&dpr=1.3&pid=1.7'); /* Replace with the actual image path */
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;
            color: white;
            text-align: center;
            font-family: Arial, sans-serif;
        }
        h1 {
            margin-top: 20%;
            color: black;
        }
        .register-button {
            margin-top: 20px;
            padding: 10px 20px;
            background-color: black;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none;
            font-size: 16px;
        }
        .register-button:hover {
            background-color: #333;
        }
        .doctors-button {
            margin-top: 10px;
            padding: 10px 20px;
            background-color: darkblue;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none;
            font-size: 16px;
        }
        .doctors-button:hover {
            background-color: navy;
        }
    </style>
</head>
<body>
    <h1>Welcome to the Hospital Management System</h1>
    <a href="/register" class="register-button">Register</a>
    <a href="/doctors" class="doctors-button">View Doctors</a>
</body>
</html>
