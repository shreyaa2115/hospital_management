<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        body {
            background-image: url('https://th.bing.com/th/id/OIP.kCCWKgptAp2Cl-HR8cFDFwHaDZ?w=342&h=160&c=7&r=0&o=5&dpr=1.3&pid=1.7'); /* Replace with the actual image path */
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
        }
        button {
            padding: 15px 30px;
            margin: 10px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background-color: #4CAF50;
            color: white;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>
    <h2>Login</h2>
    <p>Select a login option below:</p>
    <button onclick="location.href='/login/doctors'">Doctors Login</button>
    <button onclick="location.href='/login/nurses'">Nurses Login</button>
    <button onclick="location.href='/login/employees'">Employees Login</button>
</body>
</html>
