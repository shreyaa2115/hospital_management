<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctors</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            color: #333;
            text-align: center;
            padding: 20px;
        }
        table {
            margin: 20px auto;
            border-collapse: collapse;
            width: 80%;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: left;
        }
        th {
            background-color: #4CAF50;
            color: white;
        }
        tr:nth-child(even) {
            background-color: #f2f2f2;
        }
        tr:hover {
            background-color: #ddd;
        }
        .back-button {
            margin-top: 20px;
            padding: 10px 20px;
            background-color: black;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none;
            font-size: 16px;
        }
        .back-button:hover {
            background-color: #333;
        }
    </style>
</head>
<body>
    <h1>Doctors and Departments</h1>
    <table>
        <thead>
            <tr>
                <th>Doctor Name</th>
                <th>Department</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Dr. SOWMIYA J</td>
                <td>Cardiology</td>
            </tr>
            <tr>
                <td>Dr. SRINIDHI A</td>
                <td>Neurology</td>
            </tr>
            <tr>
                <td>Dr. TAMILARASI B</td>
                <td>Pediatrics</td>
            </tr>
            <!-- Add more rows as needed -->
        </tbody>
    </table>
    <a href="/" class="back-button">Back to Home</a>
</body>
</html>
