<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Form</title>
    <style>
        body {
            background-image: url('https://th.bing.com/th/id/OIP.UFvARJApp-GYQLsf-mlXuAHaEO?w=296&h=180&c=7&r=0&o=5&dpr=1.3&pid=1.7'); /* Replace with the actual image path */
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: black;
        }
        form {
            background: rgba(0, 0, 0, 0.8); /* Changed to black with transparency */
            padding: 20px;
            border-radius: 8px;
            text-align: left;
            width: 300px;
            color: white; /* Ensure text is visible on black background */
        }
        label {
            display: block;
            margin: 10px 0 5px;
        }
        input, select {
            width: 100%;
            padding: 8px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            background-color: #4CAF50;
            color: white;
        }
        button:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>
    <h2>Login Form</h2>
    <form method="POST" action="">
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" required>

        <label for="id_number">ID Number:</label>
        <input type="text" id="id_number" name="id_number" required>

        <label for="age">Age:</label>
        <input type="number" id="age" name="age" required>

        <label for="gender">Gender:</label>
        <select id="gender" name="gender" required>
            <option value="Male">Male</option>
            <option value="Female">Female</option>
            <option value="Other">Other</option>
        </select>

        <label for="department">Department:</label>
        <input type="text" id="department" name="department" required>

        <label for="timing">Timing of Login:</label>
        <input type="datetime-local" id="timing" name="timing" required>

        <button type="submit">Submit</button>
    </form>
</body>
</html>
